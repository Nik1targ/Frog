<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas — Движущийся круг</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Задания 1–5: Движущийся круг</h2>
    <canvas id="myCanvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <label for="speedSlider">Скорость:</label>
        <input type="range" id="speedSlider" min="1" max="10" value="3" step="0.5">
        <span>Текущая: <span id="speedValue">3</span></span>
    </div>

    <script src="canvas.js"></script>
</body>
</html>
